name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check src/lestudio

      - name: Type check with mypy
        run: python -m mypy src/lestudio --ignore-missing-imports

      - name: Compile backend
        run: python -m compileall -q src/lestudio

      - name: Enforce LeRobot import boundary
        run: |
          violations="$(rg -n '\b(from|import)\s+lerobot(\.|\b)' src/lestudio \
            | grep -vE 'src/lestudio/(teleop_bridge|record_bridge|camera_patch|device_registry|motor_monitor_bridge)\.py:' || true)"
          if [ -n "$violations" ]; then
            echo "Found forbidden lerobot imports:"
            echo "$violations"
            exit 1
          fi

      - name: Run tests
        run: python -m pytest -q -m "not smoke_hw" -p pytest_cov.plugin --cov=lestudio --cov-report=term-missing --cov-report=xml tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run frontend E2E smoke tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Build frontend
        working-directory: frontend
        run: npm run build
